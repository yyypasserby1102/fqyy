<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>FQYY - A Cultivation Journey</title>
    <meta name="description" content="Survive, cultivate, and ascend in a xiuxian action roguelite." />
    <meta name="theme-color" content="#071018" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <style>
      :root {
        --fqyy-display-scale: 1;
        color-scheme: dark;
        font-family: "Trebuchet MS", "Noto Sans SC", sans-serif;
        background:
          radial-gradient(circle at top, #23374d 0%, #0c1118 45%, #04070a 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
      }

      #app {
        width: 100vw;
        height: 100vh;
      }

      .game-surface {
        position: fixed;
        left: 50%;
        top: 50%;
        width: calc(100vw / var(--fqyy-display-scale));
        height: calc(100vh / var(--fqyy-display-scale));
        transform: translate(-50%, -50%) scale(var(--fqyy-display-scale));
        transform-origin: center;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
