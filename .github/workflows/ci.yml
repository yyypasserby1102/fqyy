name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:all
        env:
          MACHINE_PLAYTEST_ARTIFACTS: artifacts/machine-playtest
      - uses: actions/upload-artifact@v7
        with:
          name: machine-playtest-report
          path: artifacts/machine-playtest
      - run: npm run verify:release
